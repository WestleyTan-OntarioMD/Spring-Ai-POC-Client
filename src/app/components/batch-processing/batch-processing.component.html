<main class="justify-content-between w-100">
  <article>
    <div class="w-100 d-flex flex-rows">
      <input
        type="file"
        multiple
        (change)="onFileSelected($event)"
        #fileInput
      />
    </div>

    <div
      class="d-flex my-2 flex-rows justify-content-between align-items-center"
    >
      <button
        (click)="onUpload(fileInput)"
        mat-raised-button
        color="primary"
        class="w-25 mb-3"
        [disabled]="!selectedFileNames.size || submitted"
      >
        Start Files Processing
      </button>

      <div class="d-flex flex-rows justify-content-end w-50 mb-2">
        <mat-progress-bar
          mode="indeterminate"
          class="w-50"
          *ngIf="submitted; else nonsubmitted"
        ></mat-progress-bar>
        <ng-template #nonsubmitted>
          <div>Upload Images or PDFs</div>
          <div class="mx-1">|</div>
          <div>Bulk Processing Demo (Internal)</div>
        </ng-template>
      </div>
    </div>
  </article>

  <mat-card>
    <mat-card-content
      oncontextmenu="return false;"
      class="w-100 h-100 bg-white content-container"
    >
      <div
        *ngFor="let file of selectedFiles"
        class="d-flex flex-row justify-content-start"
      >
        <span class="cursor--pointer" (click)="removeFile(file)">✕</span>
        <mat-divider [vertical]="true" class="mx-1"></mat-divider>
        <span>{{ file.size | size }}</span>
        <mat-divider [vertical]="true" class="mx-1"></mat-divider>
        <span>{{ file.name }}</span>
      </div>
    </mat-card-content>
  </mat-card>
</main>
